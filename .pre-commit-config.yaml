# pre-commit hook configuration for CredWeaver
# Install: pip install pre-commit && pre-commit install
# Manual run: pre-commit run --all-files

default_language_version:
  python: python3.12

repos:
  # ── Python formatting ────────────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff
        name: ruff lint
        args: [--fix, --exit-non-zero-on-fix]
        files: ^(credweaver|tests)/
      - id: ruff-format
        name: ruff format
        files: ^(credweaver|tests)/

  # ── Python type checking ─────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        name: mypy
        args: [--ignore-missing-imports]
        files: ^credweaver/
        additional_dependencies:
          - pydantic>=2
          - pyyaml>=6
          - typer>=0.12
          - rich>=13

  # ── Rust formatting & linting ─────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        language: script
        entry: scripts/cargo-fmt-check.sh
        pass_filenames: false
        files: ^rust_engine/

      - id: cargo-clippy
        name: cargo clippy
        language: script
        entry: scripts/cargo-clippy-check.sh
        pass_filenames: false
        files: ^rust_engine/
