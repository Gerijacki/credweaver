apiVersion: v1
kind: ConfigMap
metadata:
  name: cupp-config
  namespace: cupp-v2
data:
  cupp.yaml: |
    generation:
      max_depth: 3
      separators: ["", "_", "-", "."]
      threshold: 500
      use_rust_engine: true
      parallel_threads: null

    mutations:
      leet:
        enabled: true
        level: 2
      case:
        modes: [lower, title, upper]
      append:
        numbers: true
        numbers_range: [0, 99]
        symbols: ["!", "@", "#", "123", "1234", "!@#"]
        years: true
        years_range: [1970, 2025]
      padding: false

    filters:
      min_length: 6
      max_length: 20
      dedup: true
      bloom_capacity: 10000000
      bloom_error_rate: 0.001

    strategies:
      enabled:
        - concatenation
        - date_based
        - keyboard_patterns
        - common_passwords
