apiVersion: batch/v1
kind: CronJob
metadata:
  name: credweaver-scheduled
  namespace: credweaver
  labels:
    app: credweaver
    component: scheduled-generator
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: credweaver
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
          containers:
            - name: credweaver
              image: credweaver:latest
              args:
                - "generate"
                - "--profile"
                - "/profiles/target.yaml"
                - "--config"
                - "/config/credweaver.yaml"
                - "--output"
                - "/output/wordlist-$(date +%Y%m%d).txt"
                - "--preset"
                - "default"
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "250m"
                limits:
                  memory: "1Gi"
                  cpu: "2"
              volumeMounts:
                - name: profiles
                  mountPath: /profiles
                  readOnly: true
                - name: output
                  mountPath: /output
                - name: config
                  mountPath: /config
                  readOnly: true
          volumes:
            - name: profiles
              configMap:
                name: credweaver-profiles
            - name: output
              persistentVolumeClaim:
                claimName: credweaver-output-pvc
            - name: config
              configMap:
                name: credweaver-config
