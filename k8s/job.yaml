apiVersion: batch/v1
kind: Job
metadata:
  name: cupp-generate
  namespace: cupp-v2
  labels:
    app: cupp-v2
    component: generator
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: cupp-v2
        component: generator
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      initContainers:
        - name: check-profile
          image: cupp-v2:latest
          command: ["python3", "-c", "import os; assert os.path.exists('/profiles/target.yaml'), 'Profile not found'"]
          volumeMounts:
            - name: profiles
              mountPath: /profiles
              readOnly: true

      containers:
        - name: cupp
          image: cupp-v2:latest
          imagePullPolicy: IfNotPresent
          args:
            - "generate"
            - "--profile"
            - "/profiles/target.yaml"
            - "--config"
            - "/config/cupp.yaml"
            - "--output"
            - "/output/wordlist.txt"
            - "--preset"
            - "aggressive"
          resources:
            requests:
              memory: "256Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "4"
          volumeMounts:
            - name: profiles
              mountPath: /profiles
              readOnly: true
            - name: output
              mountPath: /output
            - name: config
              mountPath: /config
              readOnly: true

      volumes:
        - name: profiles
          configMap:
            name: cupp-profiles
        - name: output
          persistentVolumeClaim:
            claimName: cupp-output-pvc
        - name: config
          configMap:
            name: cupp-config
